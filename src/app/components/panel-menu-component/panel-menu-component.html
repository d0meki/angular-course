<div class="card flex flex-col items-center">
  <p-panelmenu [model]="items" class="w-full md:w-80">
    <ng-template #item let-item>
      <a
        pRipple
        class="flex items-center px-4 py-2 cursor-pointer group"
        [routerLink]="item.routerLink"
        routerLinkActive="active font-bold"
      >
        <i [class]="item.icon + ' text-primary group-hover:text-inherit'"></i>
        <span class="ms-2">{{ item.label }}</span>
        <!-- <p-badge *ngIf="item.badge" class="ms-auto" [value]="item.badge" /> -->
        <!-- @if (item.shortcut) {
          <span
            class="ms-auto border border-surface rounded bg-emphasis text-muted-color text-xs p-1"
            >{{ item.shortcut }}</span
          >
        } -->
      </a>
    </ng-template>
  </p-panelmenu>
</div>
