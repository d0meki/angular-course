<section class="mt-5">
  <div class="card">
    <p-table [value]="products()">
      <ng-template #header>
        <tr>
          <th></th>
          <th>Titulo</th>
          <th>Precio</th>
          <th>Inventario</th>
          <th>Opciones</th>
        </tr>
      </ng-template>
      <ng-template #body let-product>
        <tr>
          <!-- row 1 -->
          <th>
            <p-checkbox [binary]="true" />
          </th>
          <td>
            <div class="flex items-center gap-3">
              <div class="avatar">
                <div class="mask mask-squircle h-12 w-12">
                  <img [src]="product.images | productImage" [alt]="product.title" />
                </div>
              </div>
              <div>
                <a
                  [routerLink]="['/admin/products', product.id]"
                  class="font-bold hover:text-accent transition-colors duration-300"
                  >{{ product.title }}</a
                >

                <div class="text-sm opacity-50">
                  {{ product.sizes.join(', ') }}
                </div>
              </div>
            </div>
          </td>
          <td>
            {{ product.price | currency }}
          </td>
          <td>
            <p-badge
              [value]="product.stock.toString()"
              [severity]="product.stock <= 10 ? 'danger' : (product.stock <= 20 ? 'warn' : 'success')"
            />
          </td>
          <th>
            <p-button
              label="Detalles"
              [text]="true"
              severity="secondary"
              size="small"
              [routerLink]="['/dashboard/store/producto', product.id]"
            />
          </th>
        </tr>
      </ng-template>
    </p-table>
  </div>
</section>
