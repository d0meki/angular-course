<section class="mx-5 mt-5">
  <h1 class="text-2xl font-bold">Store Page</h1>
  <h3 class="text-xl font-thin">Home Page</h3>
</section>
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 mt-2 gap-3 m-5">
  @for (product of productsResource.value()?.products; track $index) {
    <product-card [product]="product" />
  }
</div>
<app-pagination
  (pageChanged)="handleOffsetPage($event)"
  [registrosPorPagina]="productsResource.value()?.products?.length ?? 0"
  [totalRegistros]="productsResource.value()?.count ?? 0"
/>
