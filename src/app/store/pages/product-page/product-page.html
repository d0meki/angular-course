<section class="mx-5 mt-5">
  <h1 class="text-2xl font-bold">Store Page</h1>
  <h3 class="text-xl font-thin">Home Page</h3>
</section>

@if (productResource.isLoading()) {
  <div class="flex justify-center items-center h-screen">
    <p-progress-spinner
      strokeWidth="8"
      fill="transparent"
      animationDuration=".5s"
      [style]="{ width: '50px', height: '50px' }"
    />
  </div>
}
@if (productResource.hasValue()) {
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
    <p-card>
      <!-- Imágenes -->
      <product-carousel [images]="productResource.value().images" />

      <!--  -->
      <div>
        <h2 class="text-2xl font-bold font-montserrat">
          {{ productResource.value().title }}
        </h2>
        <!-- <div class="divider"></div> -->
        <p-divider />
        <p>
          {{ productResource.value().description }}
        </p>
      </div>
    </p-card>
  </div>
}
