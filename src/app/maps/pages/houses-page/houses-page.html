<section class="mx-5 mt-5">
  <h1 class="text-2xl font-bold">Full Screen Map</h1>
  <h3 class="text-xl font-thin">Mapa Completo</h3>
</section>
<!-- <section class="grid grid-cols-4 gap-4 mt-5"> -->
<!-- <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4"></div> -->
<section class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 mt-5">
  @for (house of houses(); track house.id; let i = $index) {
    <p-card
      ><ng-template #header>
        <!-- <img
          alt="Card"
          class="w-full"
          src="https://primefaces.org/cdn/primeng/images/card-ng.jpg"
        /> -->
        <app-mini-map [lngLat]="house.lngLat" [zoom]="15" />
      </ng-template>
      <ng-template #title> {{ i + 1 }}. {{ house.name }} </ng-template>
      <p>{{ house.description }}</p>
      <ng-template #footer>
        <div class="flex gap-4 mt-1">
          @for (tag of house.tags; track $index) {
            <p-tag [value]="tag" />
          }
        </div>
      </ng-template>
    </p-card>
  }
</section>
