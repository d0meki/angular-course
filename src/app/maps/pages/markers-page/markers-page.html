<section class="w-full flex justify-center mt-5">
  <p-card class="w-[80vw]">
    <div #map class="w-full h-[70vh]"></div>
  </p-card>
</section>

<section
  class="w-[80vw] mx-auto mt-4 lg:fixed lg:w-[260px] lg:left-[12vw] lg:top-[20vh] bg-white rounded-xl p-5 shadow-lg overflow-y-auto max-h-[70vh]"
>
  <h2 class="text-xl font-bold text-black mb-2">Marcadores</h2>

  <div class="flex flex-col gap-2">
    @for (marker of markers(); track marker.id) {
      <div
        class="form-control"
        (click)="flyToMarker(marker.mapboxMarker.getLngLat())"
        (dblclick)="deleteMarker(marker)"
      >
        <label class="label cursor-pointer">
          <span class="label-text text-black text-xs">
            {{ marker.mapboxMarker.getLngLat() | json }}
          </span>

          <input
            type="radio"
            name="radio-10"
            class="radio"
            [style]="{
              backgroundColor: marker.mapboxMarker._color,
            }"
            checked="checked"
          />
        </label>
      </div>
    } @empty {
      <div class="flex justify-center items-center bg-blue-100 rounded py-5">
        <p class="text-xs text-secondary">No hay marcadores</p>
      </div>
    }
  </div>
</section>
