<section class="mx-5 mt-5">
  <h1 class="text-2xl font-bold">Full Screen Map</h1>
  <h3 class="text-xl font-thin">Mapa Completo</h3>
</section>
<!-- <section class="grid grid-cols-4 gap-4 mt-5"> -->
<!-- <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4"></div> -->
<section class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 mt-5">
  <p-card>
    <div #map></div>
  </p-card>
  <!-- <p-card> mapa 2 </p-card>
  <p-card> mapa 3 </p-card> -->
</section>
<section id="controls">
  <h2 class="text-2xl font bold text-balck mb-2">
    Zoom
    <small class="text-gray-500 font-normal">{{ zoom() | number: '1.0-0' }}</small>
  </h2>
  <p-slider [ngModel]="zoom()" (ngModelChange)="zoom.set($event)" min="1" max="19" class="w-56" />

  <h2 class="text-2xl font-bold text-black mb-2">Coordenadas</h2>
  <pre class="text-sm text-gray-500 font-normal"
    >{{
      {
        latitude: coordinates().lat | number: '1.4-4',
        longitude: coordinates().lng | number: '1.4-4',
      } | json
    }}
  </pre>
</section>
