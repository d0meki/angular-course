<section class="mx-5 mt-5">
  <h1 class="text-2xl font-bold">Selectores anidados</h1>
  <h3 class="text-xl font-thin">Templates driven forms</h3>
</section>
<p-divider />
<section class="grid grid-cols-1">
  <p-card header="Formulario">
    <!--  (ngSubmit)="onSubmit()" -->
    <form [formGroup]="myForm" autocomplete="off">
      <div class="grid grid-cols-2 items-center gap-4">
        <div>
          <label style="font-weight: bold" for="region">Region</label>
        </div>
        <div class="flex flex-col gap-4">
          <p-select
            [options]="regions()"
            formControlName="region"
            placeholder="Seleccione una región"
            class="w-full"
          />
        </div>
        <div>
          <label style="font-weight: bold" for="country"> País </label>
        </div>
        <div class="flex flex-col gap-4">
          <p-select
            [options]="countriesByRegion()"
            formControlName="country"
            placeholder="Seleccione un país"
            class="w-full md:w-56"
            optionLabel="name.common"
            optionValue="cca3"
          />
        </div>

        <div>
          <label style="font-weight: bold" for="border"> Frontera </label>
        </div>
        <div class="flex flex-col gap-4">
          <p-select
            [options]="borders()"
            formControlName="border"
            optionLabel="name.common"
            placeholder="Select a border"
            class="w-full md:w-56"
            optionValue="cca3"
          />
        </div>
      </div>
    </form>
  </p-card>
</section>
<p-divider />
<section class="grid grid-cols-1">
  <p-card header="Formulario">
    <code>
      <!-- {{ 'myForm.value' | json }} -->
    </code>
    <p>is form valid: {{ myForm.valid }}</p>
    <p>Value: {{ myForm.value | json }}</p>
  </p-card>
</section>
